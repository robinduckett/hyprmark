# hyprmark configuration
# ~/.config/hypr/hyprmark.conf
#
# All values shown below are the defaults. Uncomment a line to override.
# Changes to this file are applied live while hyprmark is running, with two
# exceptions:
#   - show_toc only controls the initial state on launch
#   - editing binds under keybind { } re-registers shortcuts on reload

general {
    # Name of a built-in theme (hypr-dark, hypr-light, github-light, github-dark,
    # catppuccin-mocha, catppuccin-latte, nord) or a custom theme file (without
    # the .css extension) placed in ~/.config/hypr/hyprmark/themes/.
    # default_theme = hypr-dark

    # Re-render the view when the open file is modified on disk.
    # live_reload = true

    # Show the table-of-contents sidebar on launch. Toggle at runtime with Ctrl+B.
    # show_toc = false

    # Initial zoom level for the rendered view (1.0 = 100%).
    # default_zoom = 1.0

    # Render inline ($...$) and display ($$...$$) LaTeX math via KaTeX.
    # enable_math = true

    # Render ```mermaid code fences as diagrams.
    # enable_mermaid = true

    # Load http:// and https:// images. Off by default — a status-bar prompt
    # in the rendered view offers a one-click opt-in for a document that
    # contains remote images.
    # allow_remote_images = false
}

keybind {
    # open            = Ctrl+O
    # open_new_window = Ctrl+Alt+O
    # new_window      = Ctrl+Alt+N
    # cycle_theme     = Ctrl+T
    # toggle_toc   = Ctrl+B
    # find         = Ctrl+F
    # zoom_in      = Ctrl+Plus
    # zoom_out     = Ctrl+Minus
    # zoom_reset   = Ctrl+0
    # export_pdf   = Ctrl+P
    # close        = Ctrl+W
}
