name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ubuntu-build:
    name: Build + test (Ubuntu)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake pkg-config ninja-build \
            gcc-14 g++-14 \
            libmd4c-dev libmd4c-html0-dev \
            libgtest-dev libgmock-dev \
            libpixman-1-dev \
            libgl1-mesa-dev libglu1-mesa-dev libxkbcommon-dev libvulkan-dev \
            gcovr
          # hyprutils >=0.11 uses <print> (C++23), needs GCC 14+
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-14 140
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-14 140

      - name: Install Qt 6.8 (newer than Ubuntu 24.04 default)
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.1'
          modules: 'qtwebengine qtwebchannel qtpositioning'
          cache: true

      - name: Build + install hyprutils + hyprlang from source
        env:
          CC: gcc-14
          CXX: g++-14
        run: |
          git clone --depth 1 https://github.com/hyprwm/hyprutils.git
          cmake -S hyprutils -B hyprutils/build -DCMAKE_BUILD_TYPE=Release
          sudo cmake --build hyprutils/build --target install -j$(nproc)
          git clone --depth 1 https://github.com/hyprwm/hyprlang.git
          cmake -S hyprlang -B hyprlang/build -DCMAKE_BUILD_TYPE=Release
          sudo cmake --build hyprlang/build --target install -j$(nproc)
          sudo ldconfig

      - name: Configure
        env:
          CC: gcc-14
          CXX: g++-14
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DHYPRMARK_COVERAGE=ON -GNinja

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Coverage (gcovr)
        run: |
          gcovr --gcov-executable='gcov-14' \
                --root . --filter 'src/' \
                --exclude 'src/main.cpp' \
                --exclude '.*_autogen/.*' \
                --xml-pretty --output coverage.xml \
                --txt --print-summary \
                build

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  nix-build:
    name: Nix flake build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: Build
        run: nix build --print-build-logs .#
      - name: Smoke
        run: ./result/bin/hyprmark --version
